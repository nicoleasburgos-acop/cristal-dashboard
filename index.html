<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Vendas — Ótica Cristal Santa Rosa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#F2F4F8;--surface:#FFFFFF;--surface2:#F7F9FC;--surface3:#EDF0F5;
  --border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.07);
  --accent:#C9A84C;--green:#1A9E5C;--red:#D93A3A;--blue-lt:#2A7DC9;--purple:#7C5CD9;--teal:#1FA39A;
  --text:#0F1F35;--text2:#3A5070;--text3:#6B89A8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:15px;line-height:1.5;}

.top-bar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:64px;background:#fff;border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:12px;}
.brand{display:flex;flex-direction:column;line-height:1.2;}
.brand-name{font-size:16px;font-weight:800;}
.brand-sub{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;}

.period-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.period-controls input,.period-controls select{
  background:var(--surface2);border:1px solid var(--border2);color:var(--text);
  padding:8px 12px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;outline:none;
}
.btn{background:var(--blue-lt);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;transition:opacity .15s;}
.btn:hover{opacity:.88;}

.container{max-width:1320px;margin:0 auto;padding:28px;}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:18px;margin-bottom:24px;}
.kpi-card{background:#fff;border:1px solid var(--border2);border-radius:14px;padding:20px 22px;}
.kpi-label{font-size:11.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.kpi-val{font-size:28px;font-weight:800;letter-spacing:-.5px;}

.section{background:#fff;border:1px solid var(--border2);border-radius:14px;padding:24px;margin-bottom:24px;}
.section-title{font-size:16px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.section-title .bar{width:4px;height:18px;background:var(--accent);border-radius:2px;}

.grid-2{display:grid;grid-template-columns:1.3fr 1fr;gap:24px;}
.grid-2 .section{margin-bottom:0;}
@media(max-width:900px){.grid-2{grid-template-columns:1fr;}}

table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding:8px 10px;border-bottom:2px solid var(--border2);}
th.num,td.num{text-align:right;}
td{padding:11px 10px;border-bottom:1px solid var(--border2);font-size:13.5px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.rank{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--surface3);font-size:10.5px;font-weight:800;color:var(--text2);margin-right:8px;}
.mix-bar{display:inline-block;height:6px;border-radius:3px;background:var(--blue-lt);vertical-align:middle;margin-left:8px;}
.pct{color:var(--text3);font-size:12px;font-weight:600;}

.chart-wrap{position:relative;height:280px;}
.chart-wrap.small{height:240px;}

#status{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;display:none;box-shadow:0 8px 24px rgba(0,0,0,.2);max-width:90vw;text-align:center;}
#status.show{display:block;}
#status.error{background:var(--red);}

.loading-overlay{position:fixed;inset:0;background:rgba(242,244,248,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:998;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue-lt);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;font-weight:600;color:var(--text2);}

.empty{text-align:center;padding:40px;color:var(--text3);font-size:14px;}

.aviso-variacao{display:flex;gap:12px;align-items:flex-start;background:#FFF8E7;border:1px solid #F0D080;border-radius:12px;padding:16px 20px;margin-bottom:24px;font-size:13px;line-height:1.6;color:var(--text2);}
.aviso-variacao .aviso-icone{font-size:18px;flex-shrink:0;margin-top:1px;}
.aviso-variacao strong{color:var(--text);font-weight:700;}
.aviso-variacao em{font-style:normal;font-weight:600;}

/* Cards de venda */
.venda-card{border:1px solid var(--border2);border-radius:10px;margin-bottom:12px;overflow:hidden;}
.venda-card:last-child{margin-bottom:0;}
.venda-header{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;background:var(--surface2);flex-wrap:wrap;cursor:pointer;user-select:none;}
.venda-header:hover{background:var(--surface3);}
.venda-chevron{font-size:12px;color:var(--text3);transition:transform .2s;flex-shrink:0;margin-top:2px;}
.venda-card.aberto .venda-chevron{transform:rotate(180deg);}
.venda-body{display:none;}
.venda-card.aberto .venda-body{display:block;}
.venda-cliente{font-weight:700;font-size:14px;flex:1;min-width:160px;}
.venda-meta-col{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--text3);}
.venda-meta-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.venda-meta-item{display:flex;align-items:center;gap:5px;}
.venda-meta-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);}
.venda-meta-val{font-size:12.5px;font-weight:600;color:var(--text2);}
.venda-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.venda-valor{font-weight:800;font-size:16px;color:var(--text);}
.venda-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;}
.badge-novo{background:#E8F5E9;color:#1A9E5C;}
.badge-antigo{background:#E3F2FD;color:#1565C0;}
/* Abas */
.venda-tabs{display:flex;border-top:1px solid var(--border2);}
.venda-tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:10px 16px;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--text3);cursor:pointer;transition:color .15s,border-color .15s;}
.venda-tab-btn.active{color:var(--blue-lt);border-bottom-color:var(--blue-lt);}
.venda-tab-btn:hover{color:var(--text2);}
.venda-tab-panel{display:none;overflow-x:auto;}
.venda-tab-panel.active{display:block;}
.venda-tab-panel table{margin:0;}
.venda-tab-panel th{background:var(--surface3);font-size:10.5px;}
.venda-tab-panel td{font-size:13px;padding:9px 10px;}
.venda-ref{font-weight:600;color:var(--text);}
.ajuste-pos{color:var(--green);font-weight:700;}
.ajuste-neg{color:var(--red);font-weight:700;}
.fin-row{display:flex;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--border2);font-size:13px;}
.fin-row:last-child{border-bottom:none;}
.fin-label{color:var(--text3);font-weight:600;}
.fin-val{font-weight:700;color:var(--text);}
.os-item{padding:12px 16px;border-bottom:1px solid var(--border2);font-size:13px;}
.os-item:last-child{border-bottom:none;}
.os-num{font-weight:800;color:var(--blue-lt);margin-right:8px;}
</style>
</head>
<body>

<div class="top-bar">
  <div class="brand">
    <div class="brand-name">Dashboard de Vendas</div>
    <div class="brand-sub">Ótica Cristal Santa Rosa</div>
  </div>
  <div class="period-controls">
    <select id="modo-periodo" onchange="onModoChange()">
      <option value="mes">Mês completo</option>
      <option value="custom">Período personalizado</option>
    </select>
    <select id="sel-mes"></select>
    <input type="date" id="data-inicio" style="display:none">
    <input type="date" id="data-fim" style="display:none">
    <button class="btn" onclick="carregar()">🔍 Buscar</button>
  </div>
</div>

<div class="container">

  <div class="kpis">
    <div class="kpi-card">
      <div class="kpi-label">Valor Vendido</div>
      <div class="kpi-val" id="kpi-valor">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Nº de Vendas</div>
      <div class="kpi-val" id="kpi-nvendas">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Quantidade de Itens</div>
      <div class="kpi-val" id="kpi-qty">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Ticket Médio</div>
      <div class="kpi-val" id="kpi-ticket">—</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title" style="justify-content:space-between;flex-wrap:wrap;gap:8px;">
      <div style="display:flex;align-items:center;gap:8px;"><span class="bar"></span>Vendas do Período</div>
      <span id="vendas-count" style="font-size:12px;font-weight:600;color:var(--text3);"></span>
    </div>
    <div id="lista-vendas"></div>
  </div>

</div>

<div id="status"></div>

<script>
const API_CNPJ = '07542559000192';
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

// De-para: grupo como vem da API SSótica -> grupo de exibição consolidado
const TIPOS_NOMES = {
  'LENTE MULTIFOCAL':      'Multifocal',
  'LENTE VISAO SIMPLES':   'Visão Simples',
  'LENTE OCUPACIONAL':     'Ocupacional',
  'ARMACOES ACETATO':      'Armação',
  'ARMACOES NYLON/METAL':  'Armação',
  'OCULOS SOLAR':          'Solar',
  'TRATAMENTO EM LENTES':  'Tratamento',
  'ACESSORIOS':            'Div',
  'LENTES DE CONTATO':     'Div',
  'ASSISTENCIA':           'Div',
  'SERVICOS':              'Div',
};

function nomeTipo(codigo){
  const chave = chaveNormalizada(codigo);
  return TIPOS_NOMES[chave] || tituloCase(codigo || 'Outros');
}

const CHART_COLORS = ['#2A7DC9','#C9A84C','#1A9E5C','#7C5CD9','#D93A3A','#1FA39A','#E08A3C','#5B7DB1','#B45CC9','#3A8F6B'];

let charts = {};

function fmtMoney(v){ return 'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtInt(v){ return (v||0).toLocaleString('pt-BR'); }

// Normaliza nomenclatura: remove acentos p/ comparação, capitaliza bonito p/ exibição
function tituloCase(str){
  return String(str||'').toLowerCase().trim()
    .replace(/(^|\s)([a-zà-ú])/g, (m,p1,p2) => p1+p2.toUpperCase());
}
function chaveNormalizada(str){
  return String(str||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toUpperCase().trim();
}

function showStatus(msg, isError, ms){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(()=>el.classList.remove('show'), ms||4000);
}

function showLoading(show){
  let el = document.getElementById('loading-overlay');
  if(show){
    if(!el){
      el = document.createElement('div');
      el.id = 'loading-overlay';
      el.className = 'loading-overlay';
      el.innerHTML = '<div class="spinner"></div><div class="loading-text">Buscando dados da API...</div>';
      document.body.appendChild(el);
    }
  } else if(el){
    el.remove();
  }
}

function initMesSelect(){
  const sel = document.getElementById('sel-mes');
  const now = new Date();
  const opts = [];
  for(let i=0;i<24;i++){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const y = d.getFullYear(), m = d.getMonth();
    opts.push(`<option value="${y}-${m}">${MESES[m]} ${y}</option>`);
  }
  sel.innerHTML = opts.join('');
}

function onModoChange(){
  const modo = document.getElementById('modo-periodo').value;
  document.getElementById('sel-mes').style.display = modo==='mes' ? '' : 'none';
  document.getElementById('data-inicio').style.display = modo==='custom' ? '' : 'none';
  document.getElementById('data-fim').style.display = modo==='custom' ? '' : 'none';
}

function getPeriodo(){
  const modo = document.getElementById('modo-periodo').value;
  if(modo==='mes'){
    const [y,m] = document.getElementById('sel-mes').value.split('-').map(Number);
    const lastDay = new Date(y, m+1, 0).getDate();
    return {
      start: `${y}-${String(m+1).padStart(2,'0')}-01`,
      end: `${y}-${String(m+1).padStart(2,'0')}-${lastDay}`
    };
  } else {
    const start = document.getElementById('data-inicio').value;
    const end = document.getElementById('data-fim').value;
    if(!start || !end) return null;
    return {start, end};
  }
}

function splitInto30DayChunks(start, end){
  const chunks = [];
  let cur = new Date(start+'T00:00:00');
  const fim = new Date(end+'T00:00:00');
  while(cur <= fim){
    const chunkEnd = new Date(cur);
    chunkEnd.setDate(chunkEnd.getDate()+29);
    const realEnd = chunkEnd > fim ? fim : chunkEnd;
    chunks.push({
      start: cur.toISOString().slice(0,10),
      end: realEnd.toISOString().slice(0,10)
    });
    cur = new Date(realEnd);
    cur.setDate(cur.getDate()+1);
  }
  return chunks;
}

async function fetchVendas(start, end){
  const chunks = splitInto30DayChunks(start, end);
  const results = await Promise.all(chunks.map(c =>
    fetch(`/.netlify/functions/ssotica?_endpoint=vendas&cnpj=${API_CNPJ}&inicio_periodo=${c.start}&fim_periodo=${c.end}`)
      .then(r => r.ok ? r.json() : [])
      .catch(() => [])
  ));
  return results.flat();
}

const SEMANAS_ORDEM = ['1ª Semana','2ª Semana','3ª Semana','4ª Semana','5ª Semana'];

let _vcardIdx = 0;

function toggleCard(cid){
  const card = document.getElementById('card-'+cid);
  const jaAberto = card.classList.contains('aberto');
  // Fecha todos
  document.querySelectorAll('.venda-card.aberto').forEach(c => c.classList.remove('aberto'));
  // Abre este se estava fechado
  if(!jaAberto) card.classList.add('aberto');
}

function switchTab(event, cardId, aba){
  event.stopPropagation(); // não propaga para o header
  document.querySelectorAll(`#card-${cardId} .venda-tab-btn`).forEach(b => b.classList.remove('active'));
  document.querySelectorAll(`#card-${cardId} .venda-tab-panel`).forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-btn-${cardId}-${aba}`).classList.add('active');
  document.getElementById(`tab-${cardId}-${aba}`).classList.add('active');
}

function renderVendas(vendas){
  const el    = document.getElementById('lista-vendas');
  const count = document.getElementById('vendas-count');

  const lista = vendas
    .filter(v => v.status === 'ATIVA')
    .sort((a,b) => b.data.localeCompare(a.data) || (b.id||0)-(a.id||0));

  count.textContent = `${lista.length.toLocaleString('pt-BR')} vendas`;
  if(!lista.length){ el.innerHTML='<div class="empty">Nenhuma venda encontrada.</div>'; return; }

  el.innerHTML = lista.map(v => {
    const cid = 'vc'+(++_vcardIdx);

    // ── Cabeçalho ───────────────────────────────────────────
    const cliente   = tituloCase(v.cliente?.nome || 'Cliente não informado');
    const consultor = tituloCase(v.funcionario?.nome || '—');
    const numVenda  = v.numero || v.id || '—';
    const dataFmt   = v.data ? new Date(v.data+'T00:00:00').toLocaleDateString('pt-BR') : '—';
    const hora      = v.hora || v.horario || '';
    const isNovo    = String(v.cliente?.tipo||v.cliente?.classificacao||'').toLowerCase().includes('novo');
    const valorTotal = fmtMoney(
      +v.valor_total || +v.valor_total_liquido ||
      (v.itens||[]).reduce((s,i)=>s+(+i.valor_total_liquido||0),0)
    );

    // Números de OS únicas
    const osNums = [...new Set(
      (v.ordens_servico||[]).map(o=>o.numero||o.id||'')
        .concat((v.itens||[]).map(i=>i.os_numero||i.ordem_servico?.numero||''))
        .filter(Boolean)
    )];

    // ── Aba 1: Produtos/Serviços ─────────────────────────────
    const itensHtml = (v.itens||[]).map(item => {
      const ref     = item.produto?.referencia || '—';
      const desc    = tituloCase(item.produto?.descricao || item.produto?.nome || '');
      const grupo   = nomeTipo(item.produto?.grupo);
      const qty     = +item.quantidade || 0;
      // Valor unitário bruto (antes de ajuste)
      const valUnit = +item.valor_unitario || +item.preco_unitario || 0;
      // Valor total líquido da linha (campo confirmado pela API)
      const valTotalLiq = +item.valor_total_liquido || 0;
      // Valor unitário líquido calculado de forma segura
      const valUnitLiq = qty > 0 ? valTotalLiq / qty : valTotalLiq;
      // Ajuste = diferença entre unitário líquido e unitário bruto
      const ajuste = valUnit > 0 ? valUnitLiq - valUnit : null;
      const ajusteHtml = ajuste !== null && ajuste !== 0
        ? `<span class="${ajuste>0?'ajuste-pos':'ajuste-neg'}">${ajuste>0?'+':''}${ajuste.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>`
        : '<span style="color:var(--text3)">—</span>';

      return `<tr>
        <td>
          <div class="venda-ref">${ref}${desc?' — '+desc:''}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px;">${grupo}</div>
        </td>
        <td class="num">${qty}</td>
        <td class="num">${valUnit ? fmtMoney(valUnit) : '<span style="color:var(--text3)">—</span>'}</td>
        <td class="num">${ajusteHtml}</td>
        <td class="num">${fmtMoney(valUnitLiq)}</td>
        <td class="num" style="font-weight:700">${fmtMoney(valTotalLiq)}</td>
      </tr>`;
    }).join('');

    // ── Aba 2: Informações Financeiras ───────────────────────
    const vTotal     = +v.valor_total || +v.valor_total_liquido || 0;
    const vDesconto  = +v.valor_desconto || +v.desconto || 0;
    const vEntrada   = +v.valor_entrada  || +v.entrada  || 0;
    const vSaldo     = +v.saldo || +v.valor_restante || (vTotal - vEntrada) || 0;
    const pagamentos = v.pagamentos || v.formas_pagamento || [];
    const pgHtml = pagamentos.length
      ? pagamentos.map(p=>`<div class="fin-row">
          <span class="fin-label">${tituloCase(p.forma||p.tipo||p.descricao||'Pagamento')}</span>
          <span class="fin-val">${fmtMoney(+p.valor||0)}</span>
        </div>`).join('')
      : '';

    const finHtml = `
      <div class="fin-row"><span class="fin-label">Valor Total</span><span class="fin-val">${fmtMoney(vTotal)}</span></div>
      ${vDesconto ? `<div class="fin-row"><span class="fin-label">Desconto</span><span class="fin-val" style="color:var(--red)">- ${fmtMoney(vDesconto)}</span></div>` : ''}
      ${vEntrada  ? `<div class="fin-row"><span class="fin-label">Entrada / Pago</span><span class="fin-val" style="color:var(--green)">${fmtMoney(vEntrada)}</span></div>` : ''}
      ${vSaldo    ? `<div class="fin-row"><span class="fin-label">Saldo em Aberto</span><span class="fin-val" style="color:var(--accent)">${fmtMoney(vSaldo)}</span></div>` : ''}
      ${pgHtml}
      ${!vDesconto&&!vEntrada&&!vSaldo&&!pgHtml ? '<div style="padding:16px;color:var(--text3);font-size:13px;">Informações financeiras não disponíveis neste período.</div>' : ''}
    `;

    // ── Aba 3: Ordens de Serviço ─────────────────────────────
    const osList = v.ordens_servico || [];
    const osHtml = osList.length
      ? osList.map(o=>`<div class="os-item">
          <span class="os-num">OS #${o.numero||o.id||'—'}</span>
          <span style="color:var(--text2);font-weight:600;">${tituloCase(o.tipo||o.descricao||'')}</span>
          ${o.status ? `<span style="font-size:11px;color:var(--text3);margin-left:8px;">${o.status}</span>` : ''}
          ${o.data_entrega ? `<span style="font-size:11px;color:var(--text3);margin-left:8px;">Entrega: ${new Date(o.data_entrega+'T00:00:00').toLocaleDateString('pt-BR')}</span>` : ''}
        </div>`).join('')
      : osNums.length
        ? osNums.map(n=>`<div class="os-item"><span class="os-num">OS #${n}</span><span style="color:var(--text3);font-size:12px;">Detalhes disponíveis ao consultar a OS diretamente no sistema.</span></div>`).join('')
        : '<div style="padding:16px;color:var(--text3);font-size:13px;">Nenhuma Ordem de Serviço vinculada a esta venda.</div>';

    return `<div class="venda-card" id="card-${cid}">
      <div class="venda-header" onclick="toggleCard('${cid}')">
        <div style="flex:1;min-width:180px;">
          <div class="venda-cliente">${cliente}</div>
          <div style="margin-top:6px;" class="venda-meta-row">

              <span class="venda-meta-label">OS</span>

            <thead><tr>

  }).join('');
}

function dayToSem(dateStr){
  const d = new Date(dateStr+'T00:00:00').getDate();
  if(d <= 7)  return '1ª Semana';
  if(d <= 14) return '2ª Semana';
  if(d <= 21) return '3ª Semana';
  if(d <= 28) return '4ª Semana';
  return '5ª Semana';
}

// Processa vendas: limpa nomenclaturas e exclui tipos irrelevantes
function processarVendas(vendas){
  const rows = [];
  let nVendas = 0;
  for(const venda of vendas){
    if(venda.status !== 'ATIVA') continue;
    const itens = venda.itens || [];
    if(!itens.length) continue;
    nVendas++;
    const consultor = tituloCase(venda.funcionario?.nome || 'Sem Consultor');
    const data = venda.data;
    const semana = dayToSem(data);
    for(const item of itens){
      const qty = +item.quantidade || 0;
      const val = +item.valor_total_liquido || 0;
      if(qty===0 && val===0) continue;
      rows.push({
        consultor,
        tipo: nomeTipo(item.produto?.grupo),
        marca: tituloCase(item.produto?.grife || 'Sem Marca'),
        data, semana,
        qty, val
      });
    }
  }
  return {rows, nVendas};
}

function agregarPor(rows, chave){
  const map = {};
  for(const r of rows){
    const k = r[chave];
    if(!map[k]) map[k] = {qty:0, val:0};
    map[k].qty += r.qty;
    map[k].val += r.val;
  }
  return Object.entries(map)
    .map(([nome,d]) => ({nome, qty:d.qty, val:d.val, ticket: d.qty ? d.val/d.qty : 0}))
    .sort((a,b) => b.val - a.val);
}

function agregarPorSemana(rows){
  const map = {};
  for(const r of rows){
    if(!map[r.semana]) map[r.semana] = {qty:0, val:0};
    map[r.semana].qty += r.qty;
    map[r.semana].val += r.val;
  }
  return SEMANAS_ORDEM
    .filter(s => map[s])
    .map(s => ({nome:s, qty:map[s].qty, val:map[s].val, ticket: map[s].qty ? map[s].val/map[s].qty : 0}));
}

function agregarConsultorPorSemana(rows){
  // Retorna { consultores: [...], semanas: [...], pivot: { consultor: { semana: val } } }
  const pivot = {};
  const semanasPresentes = new Set();
  for(const r of rows){
    if(!pivot[r.consultor]) pivot[r.consultor] = {};
    pivot[r.consultor][r.semana] = (pivot[r.consultor][r.semana]||0) + r.val;
    semanasPresentes.add(r.semana);
  }
  const semanas = SEMANAS_ORDEM.filter(s => semanasPresentes.has(s));
  const consultores = Object.keys(pivot).sort((a,b)=>{
    const totalA = semanas.reduce((s,sem)=>s+(pivot[a][sem]||0),0);
    const totalB = semanas.reduce((s,sem)=>s+(pivot[b][sem]||0),0);
    return totalB - totalA;
  });
  return {consultores, semanas, pivot};
}

function limparTudo(){
  document.getElementById('kpi-qty').textContent = '0';
  document.getElementById('kpi-ticket').textContent = fmtMoney(0);
  document.getElementById('kpi-valor').textContent = fmtMoney(0);
  document.getElementById('kpi-nvendas').textContent = '0';
  document.getElementById('lista-vendas').innerHTML = '';
  document.getElementById('vendas-count').textContent = '';
}

async function carregar(){
  const periodo = getPeriodo();
  if(!periodo){
    showStatus('⚠️ Selecione um período válido.', true);
    return;
  }

  showLoading(true);
  try{
    const vendas = await fetchVendas(periodo.start, periodo.end);
    const {rows, nVendas} = processarVendas(vendas);

    if(!rows.length){
      showLoading(false);
      showStatus('⚠️ Nenhuma venda encontrada nesse período.', true, 5000);
      limparTudo();
      return;
    }

    const totalQty = rows.reduce((s,r)=>s+r.qty, 0);
    const totalVal = rows.reduce((s,r)=>s+r.val, 0);
    const ticketMedio = nVendas ? totalVal/nVendas : 0;

    document.getElementById('kpi-valor').textContent = fmtMoney(totalVal);
    document.getElementById('kpi-nvendas').textContent = fmtInt(nVendas);
    document.getElementById('kpi-qty').textContent = fmtInt(totalQty);
    document.getElementById('kpi-ticket').textContent = fmtMoney(ticketMedio);

    renderVendas(vendas);

    showLoading(false);
    showStatus(`✅ ${nVendas.toLocaleString('pt-BR')} vendas carregadas — ${periodo.start} a ${periodo.end}`, false, 5000);
  }catch(err){
    showLoading(false);
    console.error(err);
    showStatus('❌ Erro ao buscar dados: ' + err.message, true, 6000);
  }
}

initMesSelect();
carregar();
</script>
